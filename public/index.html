<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GhostBoards QR Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/style.css" />
</head>

<body>

<header class="gb-header">
  <div class="gb-header-left">
    <img src="/ghostboards-logo.png" class="gb-logo" />
    <h1>QR Studio</h1>
  </div>

  <nav class="gb-nav">
    <a href="/index.html" class="gb-nav-btn gb-nav-btn-active">QR Studio</a>
    <a href="/pages/videos.html" class="gb-nav-btn">Videos</a>
    <a href="/pages/guides.html" class="gb-nav-btn">Guides</a>
    <a href="/pages/library.html" class="gb-nav-btn">Library</a>
    <a href="/pages/how-to.html" class="gb-nav-btn">QR Manual</a>
  </nav>
</header>

<main class="gb-main">

  <!-- QR CREATOR -->
  <section class="gb-panel">
    <h2>Create QR</h2>

    <label class="gb-label">Target URL
      <input id="targetUrl" type="url" class="gb-input" />
    </label>

    <label class="gb-label">Video URL
      <input id="videoUrl" type="url" class="gb-input" />
    </label>

    <label class="gb-label">Title
      <input id="titleInput" type="text" class="gb-input" />
    </label>

    <label class="gb-label">Instructions
      <textarea id="instructionsInput" class="gb-textarea" rows="3"></textarea>
    </label>

    <button id="generateBtn" class="gb-btn ghost-primary">Generate QR</button>
  </section>

  <!-- QR PREVIEW -->
  <section class="gb-panel">
    <h2>Preview</h2>
    <div id="qrContainer" class="qr-container"></div>

    <div class="gb-row">
      <button id="downloadPngBtn" class="gb-btn ghost-secondary">PNG</button>
      <button id="downloadSvgBtn" class="gb-btn ghost-outline">SVG</button>
      <button id="printBtn" class="gb-btn ghost-primary">Print</button>
      <button id="shareBtn" class="gb-btn ghost-secondary">Share</button>
    </div>
  </section>

  <!-- QUICK ACCESS LIBRARY -->
  <section class="gb-panel">
    <h2>Quick Access</h2>

    <div class="ql-section">
      <h3>Guides</h3>
      <ul id="quickGuides" class="ql-list"></ul>
    </div>

    <div class="ql-section">
      <h3>Videos</h3>
      <ul id="quickVideos" class="ql-list"></ul>
    </div>

    <div class="ql-section">
      <h3>QR Library</h3>
      <ul id="quickQr" class="ql-list"></ul>
    </div>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>
<script src="/js/index.js"></script>
<script src="/js/quick-access.js"></script>

</body>
</html>
