<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Guides</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/style.css" />
</head>

<body>

<header class="gb-header">
  <div class="gb-header-left">
    <img src="/ghostboards-logo.png" class="gb-logo" />
    <h1>Guides</h1>
  </div>

  <nav class="gb-nav">
    <a href="/index.html" class="gb-nav-btn">QR Studio</a>
    <a href="/pages/videos.html" class="gb-nav-btn">Videos</a>
    <a href="/pages/guides.html" class="gb-nav-btn gb-nav-btn-active">Guides</a>
     <a href="/pages/library.html" class="gb-nav-btn">library</a>
    <a href="/pages/how-to.html" class="gb-nav-btn">qr-manual</a>
  </nav>
</header>

<main class="gb-main">

  <section class="gb-panel">
    <h2>Add Guide</h2>

    <label class="gb-label">Title
      <input id="guideTitle" type="text" class="gb-input" />
    </label>

    <label class="gb-label">Category
      <input id="guideCategory" type="text" class="gb-input" />
    </label>

    <label class="gb-label">Content
      <textarea id="guideContent" class="gb-textarea" rows="6"></textarea>
    </label>

    <button id="addGuideBtn" class="gb-btn ghost-primary">Save Guide</button>
  </section>

  <section class="gb-panel">
    <h2>Search</h2>
    <input id="guideSearch" type="text" class="gb-input" placeholder="Search..." />
    <ul id="guideList" class="item-list"></ul>
  </section>

</main>

<script src="/js/guides.js"></script>
</body>
</html>
